<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
    <!-- Background -->
    <rect width="100%" height="100%" fill="#020617" />
    
    <!-- Grid Pattern -->
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
        </pattern>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="url(#grid)" />

    <!-- Connection Arrows -->
    <path d="M 120 130 L 240 130" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
    <path d="M 120 180 L 240 180" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
    <path d="M 120 230 L 240 230" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
    <path d="M 360 180 L 420 180" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
    <path d="M 460 180 L 520 180" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
    <path d="M 600 210 L 600 270" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
    <path d="M 520 300 L 420 300" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
    <path d="M 680 180 L 720 180 L 720 360 L 680 360" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
    <path d="M 600 390 L 600 450" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" />
    <path d="M 340 330 L 340 480 L 520 480 L 520 330" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4" fill="none" marker-end="url(#arrowhead)" />

    <!-- Boundary Boxes -->
    <rect x="230" y="80" width="460" height="320" rx="8" fill="rgba(30, 41, 59, 0.1)" stroke="#1e293b" stroke-dasharray="5,5" />
    <text x="240" y="100" fill="#94a3b8" font-size="9" font-weight="700">CORE RUNTIME (SYSTEMD USER SERVICE)</text>

    <!-- AI AGENTS -->
    <rect x="40" y="110" width="80" height="40" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1.5" />
    <text x="80" y="132" fill="#f8fafc" font-size="10" text-anchor="middle">Claude</text>
    <rect x="40" y="160" width="80" height="40" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1.5" />
    <text x="80" y="182" fill="#f8fafc" font-size="10" text-anchor="middle">Codex</text>
    <rect x="40" y="210" width="80" height="40" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1.5" />
    <text x="80" y="232" fill="#f8fafc" font-size="10" text-anchor="middle">Gemini</text>

    <!-- HOOK SCRIPTS -->
    <rect x="240" y="110" width="120" height="140" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5" />
    <text x="300" y="175" fill="#f8fafc" font-size="11" text-anchor="middle">Hook Scripts</text>
    <text x="300" y="190" fill="#34d399" font-size="8" text-anchor="middle">linux_agent_island.hooks</text>

    <!-- SOCKET -->
    <circle cx="440" cy="180" r="20" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5" />
    <text x="440" y="215" fill="#fb923c" font-size="8" text-anchor="middle">Unix Socket</text>

    <!-- BACKEND -->
    <rect x="520" y="110" width="160" height="100" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5" />
    <text x="600" y="150" fill="#f8fafc" font-size="12" text-anchor="middle" font-weight="700">Backend Service</text>
    <text x="600" y="175" fill="#34d399" font-size="9" text-anchor="middle">Session Management</text>

    <!-- D-BUS -->
    <rect x="520" y="270" width="160" height="60" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5" />
    <text x="600" y="300" fill="#f8fafc" font-size="11" text-anchor="middle">D-Bus Interface</text>

    <!-- FRONTEND -->
    <rect x="260" y="270" width="160" height="60" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5" />
    <text x="340" y="300" fill="#f8fafc" font-size="12" text-anchor="middle" font-weight="700">GTK Island</text>

    <!-- INSPECTOR -->
    <rect x="520" y="340" width="160" height="50" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5" />
    <text x="600" y="365" fill="#f8fafc" font-size="10" text-anchor="middle">Process Inspector</text>

    <!-- OS -->
    <rect x="520" y="450" width="160" height="60" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5" />
    <text x="600" y="480" fill="#f8fafc" font-size="11" text-anchor="middle">X11 / Terminal</text>

    <!-- Legend -->
    <g transform="translate(40, 540)">
        <rect x="0" y="0" width="12" height="12" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1" />
        <text x="18" y="10" fill="#94a3b8" font-size="8">Frontend</text>
        <rect x="80" y="0" width="12" height="12" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1" />
        <text x="98" y="10" fill="#94a3b8" font-size="8">Backend</text>
        <rect x="160" y="0" width="12" height="12" rx="2" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1" />
        <text x="178" y="10" fill="#94a3b8" font-size="8">Message Bus</text>
    </g>
</svg>
